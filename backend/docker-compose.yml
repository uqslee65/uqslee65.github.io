services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@db:5432/umami
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - umami-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "3000:3000"
    environment:
      GITHUB_USER: Mon-ius
      UMAMI_URL: http://umami:3000
      FORMULAS_URL: http://formulas:8000
      CORS_ORIGIN: https://Mon-ius.github.io
    depends_on:
      - formulas
    restart: unless-stopped

  formulas:
    build: ./formulas
    ports:
      - "3002:8000"
    restart: unless-stopped

volumes:
  umami-data:
